services:
  api:
    build:
      context: .
      dockerfile: UrlShortener.Api/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      redis:
        condition: service_started
      sqlserver:
        condition: service_healthy
    environment:
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=UrlShortenerDb;User=sa;Password=Your_password123;TrustServerCertificate=True;

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_password123" -C -Q "SELECT 1"',
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
